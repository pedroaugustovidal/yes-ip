app = "yesip-api"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"
  build-target = "runtime"

[deploy]
  release_command = "pnpm --filter @yesip/db exec tsx src/migrate.ts"

[env]
  NODE_ENV = "production"
  API_HOST = "0.0.0.0"
  API_PORT = "3000"
  TRUST_PROXY = "true"
  DATABASE_SSL = "require"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
