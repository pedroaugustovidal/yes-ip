services:
  postgres:
    image: postgres:16-alpine
    container_name: yesip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-yesip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yesip_dev}
      POSTGRES_DB: ${POSTGRES_DB:-yesip}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-yesip} -d ${POSTGRES_DB:-yesip}']
      interval: 5s
      timeout: 3s
      retries: 10
